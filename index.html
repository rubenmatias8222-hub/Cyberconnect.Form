<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Background glow effect */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(0, 255, 170, 0.15);
  filter: blur(100px);
  border-radius: 50%;
  top: 10%;
}

/* Login box */
.login-container {
  position: relative;
  width: 350px;
  padding: 30px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.login-container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #00ffae;
}

.input-box {
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: white;
}

.input-box input::placeholder {
  color: #aaa;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #00ffae;
  color: #00110d;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00c98a;
}

.footer-text {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="login-container">
  <h2>SECURE ACCESS</h2>

  <div class="input-box">
    <input type="text" placeholder="Username">
  </div>

  <div class="input-box">
    <input type="password" placeholder="Password">
  </div>

  <button>LOGIN</button>

  <div class="footer-text">
    Encrypted session • Cybersecurity system
  </div>
</div>

</body>
</html>
