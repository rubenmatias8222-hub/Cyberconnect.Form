<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Resource Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #0b1220;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  background: #0f1a2e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  color: #00ffae;
}

button {
  cursor: pointer;
}

/* MAIN DASHBOARD */
.container {
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* LOCKED CONTENT STYLE */
.locked {
  filter: blur(3px);
  pointer-events: none;
  opacity: 0.5;
}

/* BUTTON */
.access-btn {
  background: #00ffae;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  font-weight: bold;
}

/* MODAL BACKDROP */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

/* MODAL BOX */
.modal-content {
  background: #111a2e;
  padding: 25px;
  border-radius: 10px;
  width: 300px;
  border: 1px solid #00ffae;
}

.modal-content h2 {
  margin-bottom: 15px;
  color: #00ffae;
}

.modal-content input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
}

.login-btn {
  width: 100%;
  background: #00ffae;
  border: none;
  padding: 10px;
  border-radius: 6px;
  font-weight: bold;
}

.close-btn {
  background: transparent;
  color: white;
  border: none;
  float: right;
  font-size: 18px;
  cursor: pointer;
}

.status {
  margin-top: 10px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <h1>CyberSec Dashboard</h1>
  <button class="access-btn" onclick="openLogin()">Access Resources</button>
</header>

<div class="container">

  <h2>System Overview</h2>

  <div id="secureContent" class="locked">
    <div class="card">🔐 Threat Intelligence Logs</div>
    <div class="card">📊 Network Traffic Monitor</div>
    <div class="card">🛡️ Firewall Status Panel</div>
    <div class="card">📡 Live Attack Detection System</div>
  </div>

</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">

    <button class="close-btn" onclick="closeLogin()">✖</button>

    <h2>Secure Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>

    <div class="status" id="statusText"></div>
  </div>
</div>

<script>
// OPEN MODAL
function openLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

// CLOSE MODAL
function closeLogin() {
  document.getElementById("loginModal").style.display = "none";
}

// SIMPLE LOGIN LOGIC (frontend demo only)
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    document.getElementById("secureContent").classList.remove("locked");
    document.getElementById("statusText").innerText = "Access granted!";
    closeLogin();
  } else {
    document.getElementById("statusText").innerText = "Invalid credentials!";
  }
}
</script>

</body>
</html>
